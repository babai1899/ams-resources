<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AMS Resources | Secure Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/loginstyles.css">

</head>

<body>

    <div class="bg-blur"></div>

    <form class="login-container" method="POST" action="/login">

        <div class="logo">
            <img src="/static/assets/admin_logo.png">
            <h2>AMS Resources</h2>
            <p>Secure Admin Access</p>
        </div>

        <div class="input-group">
            <input type="text" name="username" required>
            <label>Username</label>
        </div>

        <div class="input-group">
            <input type="password" name="password" required>
            <label>Password</label>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
            <span class="btn-text">Login</span>
            <span class="spinner"></span>
            <span class="progress"></span>
        </button>

    </form>

    <script src="/static/js/loginscript.js"></script>

</body>

</html>
